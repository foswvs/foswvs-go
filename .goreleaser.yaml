# .goreleaser.yaml
version: 2

builds:
  - id: foswvs
    main: ./cmd/main.go
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - arm64
      - arm
    goarm: 7
    ldflags:
      - -s -w -X main.Version={{ .Version }}
    binary: foswvs-go

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}{{ if .Arm }}v{{ .Arm }}{{ end }}"
    files:
      - LICENSE
      - README.md
      - INSTALL.md

checksum:
  name_template: 'checksums.txt'
  algorithm: sha256

changelog:
  use: github
  sort: asc

release:
  prerelease: auto
  draft: false
  name_template: 'Release {{.Tag}}'
