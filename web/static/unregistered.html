<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0d9488" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#0d0f14" media="(prefers-color-scheme: dark)">
<link rel="shortcut icon" href="/favicon.ico" type="image/x-icon">
<link rel="stylesheet" href="/css/portal.css">
<title>Device Not Registered &mdash; PisoWiFi</title>
</head>
<body>
<div class="app-shell">
  <main class="content no-nav" style="display:flex;flex-direction:column;justify-content:center;min-height:100vh;min-height:100dvh;">
    <div class="card" style="text-align:center;">
      <svg viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="width:44px;height:44px;color:var(--warning);margin-bottom:12px;">
        <path d="M2 8.5a15 15 0 0 1 20 0"/><path d="M5 12.5a10 10 0 0 1 14 0"/><path d="M8.5 16.5a5 5 0 0 1 7 0"/><line x1="12" y1="20" x2="12.01" y2="20"/><line x1="3" y1="3" x2="21" y2="21"/>
      </svg>
      <h2 style="margin-bottom:10px;">Device Not Registered</h2>
      <div class="status-row" style="margin-bottom:14px;">
        <div class="status-pill checking"><span class="dot"></span>Waiting for network registration</div>
      </div>
      <p class="hint" style="margin-bottom:18px;">Your device hasn&rsquo;t been detected by the portal yet. Reconnect to the WiFi network, then try again.</p>
      <button class="btn btn-primary" onclick="location.assign('/')">TRY AGAIN</button>
    </div>
  </main>
</div>
</body>
</html>
