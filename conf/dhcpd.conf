# PisoWiFi DHCP config (isc-dhcp-server) — see INSTALL.md.
# Must match the static IP given to wlan0 (10.0.0.1) and the DNAT target
# in scripts/iptables-base.sh.

ddns-update-style none;
authoritative;

default-lease-time 43200;   # 12h
max-lease-time 86400;       # 24h

subnet 10.0.0.0 netmask 255.255.255.0 {
  range 10.0.0.10 10.0.0.250;
  option routers 10.0.0.1;
  option domain-name-servers 10.0.0.1;
  option subnet-mask 255.255.255.0;
  option broadcast-address 10.0.0.255;
}
