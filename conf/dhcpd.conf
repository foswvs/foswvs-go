# PisoWiFi DHCP config (isc-dhcp-server) — see INSTALL.md.
# Must match the static IP given to wlan0 (10.0.0.1) and the DNAT target
# in scripts/iptables-base.sh.

ddns-update-style none;
authoritative;

default-lease-time 3600;   # 1h
max-lease-time 86400;      # 24h

subnet 10.0.0.0 netmask 255.255.240.0 {
  range 10.0.0.10 10.0.15.254;
  option routers 10.0.0.1;
  option broadcast-address 10.0.15.255;
  option domain-name-servers 94.140.14.14, 94.140.15.15, 1.1.1.1, 8.8.8.8;
}

# DHCP hook: notifies the foswvs-go API of lease commits
on commit {
  execute("/home/pi/foswvs-go/api/dhcp_hook", binary-to-ascii(10,8,".",leased-address), binary-to-ascii(16,8,":",substring(hardware,1,6)), pick-first-value(option host-name,"-NA-"));
}
