# PisoWiFi access point config — see INSTALL.md.
#
# Open SSID by design: anyone can join the WiFi for free, but the captive
# portal (this app) gates actual internet access behind payment/sharing.
# That's the product, not an oversight — don't add wpa_* lines unless you
# specifically want a WiFi password on top of that.

interface=wlan0
driver=nl80211
ssid=PisoWiFi
hw_mode=g
channel=7
wmm_enabled=0
macaddr_acl=0
auth_algs=1
ignore_broadcast_ssid=0
